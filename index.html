<!DOCTYPE html>
<head>
<title>blahblahblah</title>
<link rel="icon" type="image/x-icon" href="images/swagOS_favicon.png">
<style>
    body {
        background-image: url("images/DSC04284.jpg"), linear-gradient(purple, blue);
        overflow:hidden;
        background-size: contain;
        background-repeat:no-repeat;
        min-height:100vh;
        background-position:center;
    }
    h1 {
        color:rgb(0, 4, 255);
        text-align:center;
        font-family:Comic Sans MS, Comic Sans, cursive;
    }
    div.glarg {
        position:relative;
        display:flex;
        justify-content:center;
        width:fit-content;
        align-items:center;
        background-color:rgb(177, 255, 157);
        margin:0 auto;
        padding:10px;
    }
    div.bar {
        position:absolute;
        display:flex;
        justify-content: space-between;
        align-items:center;
        left:5%;
        width:90%;
        background-color: aquamarine;
        bottom:1%;
        padding:10px;
        overflow:hidden;
        margin:0 auto;
    }
    p {
        text-align: center;
    }
    div.random_box {
        position:absolute;
        top:30%;
        left:16%;
        width:300px;
        height:200px;
        background-color: rgb(255, 0, 0);
        margin:0 auto;
        border: solid 12px;
        border-color:blueviolet;
        border-radius: 50%;
        transition: transform 0.3s ease;
    }
    @keyframes spin {
        from{transform:rotate(0deg) scale(1);}
        to{transform:rotate(39deg) scale(2);}
    }
    .random_box:hover {
        transform:rotate(360deg) scale(1.2);
    }
    
    div.box3 {
        position:absolute;
        top:35%;
        left:66%;
        width:300px;
        height:200px;
        background-color: rgb(49, 49, 236);
        margin:0 auto;
        border: solid 12px;
        border-color:greenyellow; 
    }
    div.box3header {
        cursor:move;
        z-index:10;
        width:300px;
        height:20px;
        background-color:green;
    }
</style>
</head>
<body>
    <script src="script.js"></script>
    <div class="bar">
        <p>swagOS v1.2</p>
        <p>25/05/05/05/05/05/05/05</p>
        <p>9:99:99;99:99AM</p>
        <p>17 38 im like hey whats up hello</p>
    </div>
    <div class="random_box">
        <h1>my names swaggart johnson whats up</h1>
    </div>
    <div id="movebox" class="box3">
        <p>box</p>
    </div>
    <div class="glarg"><h1>welcome to swagOS<br>the swaggest os</h1></div>
<script src="script.js"></script>
</body>
